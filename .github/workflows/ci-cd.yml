name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: ecommerce_db
          POSTGRES_USER: ecom
          POSTGRES_PASSWORD: ecom
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - name: Checkout código
      uses: actions/checkout@v4

    - name: Setup Java 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Build com Maven
      run: mvn -B clean package -DskipTests
      env:
        MAVEN_OPTS: -Xmx1024m

    - name: Executar testes unitários e de integração
      run: mvn -B test
      env:
        MAVEN_OPTS: -Xmx1024m

    - name: Gerar relatório de cobertura
      run: mvn jacoco:report
      continue-on-error: true

    - name: Upload relatório de cobertura
      uses: codecov/codecov-action@v3
      with:
        file: ./target/site/jacoco/jacoco.xml
        flags: unittests
        fail_ci_if_error: false
      continue-on-error: true

  code-quality:
    runs-on: ubuntu-latest
    needs: build

    steps:
    - name: Checkout código
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Java 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: SonarQube Scan
      run: |
        mvn clean verify sonar:sonar \
          -Dsonar.projectKey=ecommerce \
          -Dsonar.sources=src/main \
          -Dsonar.tests=src/test \
          -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} \
          -Dsonar.login=${{ secrets.SONAR_TOKEN }}
      continue-on-error: true

  docker-build:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'

    steps:
    - name: Checkout código
      uses: actions/checkout@v4

    - name: Setup Java 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Build aplicação
      run: mvn -B clean package -DskipTests

    - name: Build Docker image
      run: |
        docker build -t ecommerce:${{ github.sha }} -t ecommerce:latest .

    - name: Save Docker image
      run: |
        docker save ecommerce:latest | gzip > ecommerce-image.tar.gz

    - name: Upload Docker image artifact
      uses: actions/upload-artifact@v3
      with:
        name: docker-image
        path: ecommerce-image.tar.gz
        retention-days: 1

  security-scan:
    runs-on: ubuntu-latest
    needs: build

    steps:
    - name: Checkout código
      uses: actions/checkout@v4

    - name: Setup Java 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Run Snyk scan
      run: |
        npm install -g snyk
        snyk auth ${{ secrets.SNYK_TOKEN }}
        snyk test --severity-threshold=high || true
      continue-on-error: true

    - name: OWASP Dependency Check
      uses: dependency-check/Dependency-Check_Action@main
      with:
        project: 'ecommerce'
        path: '.'
        format: 'JSON'
        args: >
          --enableExperimental
      continue-on-error: true

    - name: Upload OWASP results
      uses: actions/upload-artifact@v3
      with:
        name: owasp-report
        path: reports/
      if: always()
      continue-on-error: true
