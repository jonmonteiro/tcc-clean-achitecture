name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: ecommerce_db
          POSTGRES_USER: ecom
          POSTGRES_PASSWORD: ecom
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - name: Checkout código
      uses: actions/checkout@v4

    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Build com Maven
      run: mvn -B clean package -DskipTests
      env:
        MAVEN_OPTS: -Xmx1024m

    - name: Executar testes unitários e de integração
      run: mvn -B test
      env:
        MAVEN_OPTS: -Xmx1024m

  docker-build:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'

    steps:
    - name: Checkout código
      uses: actions/checkout@v4

    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Build aplicação
      run: mvn -B clean package -DskipTests

    - name: Build Docker image
      run: |
        docker build -t ecommerce:${{ github.sha }} -t ecommerce:latest .

    - name: Save Docker image
      run: |
        docker save ecommerce:latest | gzip > ecommerce-image.tar.gz

    - name: Upload Docker image artifact
      uses: actions/upload-artifact@v4
      with:
        name: docker-image
        path: ecommerce-image.tar.gz
        retention-days: 1


